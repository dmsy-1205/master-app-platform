<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master App Platform - STEP 3</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="wrap">
    <h1>Master App Platform</h1>
    <p class="subtitle">STEP 3 - 관리자 권한 시스템 테스트</p>

    <section class="card">
      <h2>회원가입</h2>
      <input id="signupEmail" type="email" placeholder="이메일">
      <input id="signupPassword" type="password" placeholder="비밀번호">
      <button id="signupBtn">회원가입</button>
    </section>

    <section class="card">
      <h2>로그인</h2>
      <input id="loginEmail" type="email" placeholder="이메일">
      <input id="loginPassword" type="password" placeholder="비밀번호">
      <button id="loginBtn">로그인</button>
    </section>

    <section class="card">
      <h2>로그인 상태</h2>
      <p id="userStatus">확인 중...</p>
      <button id="logoutBtn">로그아웃</button>
    </section>

    <section class="card">
      <h2>STEP 2 DB 테스트</h2>
      <button id="writeTestBtn">쓰기 테스트</button>
      <button id="readTestBtn">읽기 테스트</button>
      <button id="deleteTestBtn">삭제 테스트</button>
      <pre id="dbResult">아직 실행 전입니다.</pre>
    </section>

    <section class="card admin-box">
      <h2>STEP 3 관리자 권한 테스트</h2>
      <p>
        현재 로그인한 사용자를 테스트용 관리자 계정으로 등록하고
        관리자 권한을 확인합니다.
      </p>

      <button id="makeAdminBtn">현재 계정을 관리자 등록</button>
      <button id="checkAdminBtn">관리자 권한 확인</button>

      <h3>관리자 상태</h3>
      <pre id="adminResult">아직 확인 전입니다.</pre>
    </section>
  </main>

  <script type="module" src="./firebase.js"></script>
  <script type="module" src="./auth.js"></script>
  <script type="module" src="./database.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
