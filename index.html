<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Master App Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div id="auth-section" class="card p-4">
      <h2>로그인</h2>
      <input id="loginEmail" class="form-control mb-2" placeholder="이메일">
      <input id="loginPassword" type="password" class="form-control mb-2" placeholder="비밀번호">
      <button id="loginBtn" class="btn btn-primary">로그인</button>
    </div>
    
    <div id="main-content" style="display:none;">
      <button id="logoutBtn" class="btn btn-danger">로그아웃</button>
      <div id="admin-section" style="display:none;">
        <h3>관리자 패널</h3>
        <table class="table"><tbody id="admin-subapp-list"></tbody></table>
      </div>
    </div>
  </div>
  <script type="module" src="./auth.js"></script>
  <script type="module" src="./database.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
